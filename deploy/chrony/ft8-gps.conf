###############################################################################
# /etc/chrony/conf.d/ft8-gps.conf
#
# Use the local gpsd-disciplined GPS as the primary time source. Public NTP
# is kept as a fallback for the rare case the GPS hasn't yet locked.
#
# Set on the Pi during install.sh.
###############################################################################

# SHM segment 0 — populated by gpsd's NTP-SHM. Offset is the GPS PPS-to-
# system-clock latency through USB; tune empirically.
refclock SHM 0 refid GPS precision 1e-1 offset 0.0 delay 0.2

# Public fallback (kept conservative — only used when GPS isn't available)
pool 2.de.pool.ntp.org iburst maxsources 4

# Log how often we adjust the clock
logdir /var/log/chrony
log measurements statistics tracking

# Allow stepping the clock at boot regardless of how far off it is
makestep 1.0 -1

# Save drift across reboots
driftfile /var/lib/chrony/drift

# Don't act as a server on the LAN by default
port 0
