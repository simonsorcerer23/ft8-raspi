###############################################################################
# /etc/dnsmasq.d/ft8-ap-fallback.conf
#
# Activated only when the Pi is in AP-fallback mode.
# Provides DHCP + a DNS-resolve-all-to-Pi catch-all so the Captive-Portal
# probes from joining Android phones land on our FastAPI.
###############################################################################

# We bind to the AP interface only (wlan0 may carry client traffic when not
# in fallback; the start-ap-fallback.sh script ensures wlan0 is the AP).
interface=wlan0
bind-interfaces

# DHCP pool for the Pi's AP
dhcp-range=192.168.66.50,192.168.66.150,12h
dhcp-option=option:router,192.168.66.1
dhcp-option=option:dns-server,192.168.66.1

# Force all DNS lookups to resolve to the Pi (Captive-Portal trick)
address=/#/192.168.66.1

# Log enough to debug captive flows without spamming
log-queries
log-facility=/var/log/dnsmasq-ft8.log
