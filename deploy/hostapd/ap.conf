###############################################################################
# /etc/hostapd/ft8-ap.conf
#
# 2.4 GHz AP for the Pi's fallback mode. The SSID + PSK get rewritten from
# config.yaml during install.sh / start-ap-fallback.sh.
###############################################################################

interface=wlan0
driver=nl80211

# WiFi country code is important legally and is set from GPS-position
# during start-ap-fallback.sh. Default is DE.
country_code=DE
ieee80211d=1

ssid=ft8-hochgericht
hw_mode=g
channel=6

# WPA2-PSK
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP

# Placeholder — rewritten from config.yaml.ap_fallback.psk
wpa_passphrase=changeme-please

# We don't broadcast on 5 GHz to keep it simple + maximally compatible
ignore_broadcast_ssid=0
